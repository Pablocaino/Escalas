<script>
const questions = [
"¿Pensaste en jugar videojuegos todo el día?",
"¿Pasas mucho tiempo libre jugando videojuegos?",
"¿Te has sentido adicto a algún videojuego?",
"¿Jugaste más tiempo del que pensabas?",
"¿Pasaste cada vez más tiempo jugando videojuegos?",
"¿No pudiste parar de jugar una vez que empezaste?",
"¿Jugaste videojuegos para olvidar la vida real?",
"¿Jugaste videojuegos para bajar el estrés?",
"¿Jugaste videojuegos para sentirte mejor?",
"¿No pudiste reducir tu tiempo de juego?",
"¿Otras personas han intentado que reduzcas el tiempo que dedicas al juego sin tener resultado?",
"¿Has fracasado intentando reducir tu tiempo de juego?",
"¿Te has sentido mal cuando no has podido jugar?",
"¿Te has sentido enojado cuando no has podido jugar?",
"¿Te has sentido estresado cuando no has podido jugar?",
"¿Has tenido peleas con otros (por ejemplo, familia, amigos) debido a estar jugando videojuegos?",
"¿Has descuidado a otros (por ejemplo, familia, amigos) debido a estar jugando videojuegos?",
"¿Has mentido sobre el tiempo que pasas jugando videojuegos?",
"¿Tu tiempo jugando videojuegos te trajo problemas de sueño?",
"¿Has descuidado otras actividades importantes (por ejemplo, escuela, trabajo, deportes) por jugar videojuegos?",
"¿Te has sentido mal por jugar por un tiempo prolongado?"
];

const options = [
"Nunca",
"Rara vez",
"A veces",
"A menudo",
"Muy a menudo"
];

let step = 0;
let answers = new Array(questions.length).fill(null);

function show(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function start(){
  step = 0;
  answers = new Array(questions.length).fill(null);
  show("quiz");
  load();
}

function load(){
  document.getElementById("question").innerText = questions[step];
  document.getElementById("progressText").innerText = `Pregunta ${step + 1} de ${questions.length}`;
  document.getElementById("progressFill").style.width = `${((step + 1) / questions.length) * 100}%`;

  let html = "";
  options.forEach((opt, i) => {
    html += `
      <label class="option">
        <input type="radio" name="q" value="${i + 1}" ${answers[step] === i + 1 ? "checked" : ""}>
        <span>${opt}</span>
      </label>
    `;
  });

  document.getElementById("options").innerHTML = html;

  document.querySelectorAll('input[name="q"]').forEach(el => {
    el.onclick = () => answers[step] = Number(el.value);
  });
}

function next(){
  if (answers[step] == null) {
    alert("Respondé antes de continuar");
    return;
  }

  if (step < questions.length - 1) {
    step++;
    load();
  } else {
    result();
  }
}

function prev(){
  if (step > 0) {
    step--;
    load();
  }
}

function result(){
  const total = answers.reduce((a, b) => a + b, 0);

  let level = "", text = "";

  if (total >= 21 && total <= 42) {
    level = "Usuario casual";
    text = "Nivel bajo de uso problemático.";
  } else if (total >= 43 && total <= 63) {
    level = "Usuario regular";
    text = "Uso frecuente sin indicadores severos.";
  } else if (total >= 64 && total <= 84) {
    level = "Usuario en riesgo";
    text = "Uso elevado con posibles consecuencias negativas.";
  } else if (total >= 85 && total <= 105) {
    level = "Usuario problemático";
    text = "Nivel severo de uso problemático.";
  }

  document.getElementById("score").innerText = `Puntaje: ${total} de 105`;
  document.getElementById("level").innerText = level;
  document.getElementById("text").innerText = text;

  show("result");
}

function restart(){
  step = 0;
  answers = new Array(questions.length).fill(null);
  show("landing");
}
</script>
